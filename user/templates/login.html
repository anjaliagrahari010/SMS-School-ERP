{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body style="background-image: url('{%static 'img/school.jpg'%}') ; background-size:cover;">
    
<div class="container-fluid">
    {{msg}}
    <div class="row" style="height: 110vh; margin-top: 20vh;" >
        <form action="{%url 'logcode'%}" method="post" class="pt-5">
            {%csrf_token%}
    <div class="col-sm-3 px-3 mx-auto    d-flex shadow-lg my-auto  justify-content-around h-50 rounded-4" style="flex-direction: column; background: linear-gradient(rgba(0, 0, 0, 0.7),rgba(0, 0, 0, 0.7)) ;">
       
        <input type="text" class="form-control" name="username" placeholder="Enter Username"  >
        <input  type="password" name = "password" placeholder="Enter Password" class="form-control rounded-2">
        <select name="utype" class="form-select"id="">
            <option selected>----Select-----</option>
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
        </select>
        <input type="submit" value = "Login" class="btn btn-outline-primary">

       </form>
    </div>
        
    </div>

</div>

</html>
