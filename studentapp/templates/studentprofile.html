{% extends "studentparent.html" %}
{% block body %}
    <div class="row">
        <div class="col-sm-12">
            <h1 style="text-align:center;">Profile</h1>   
            <form method="post" class="row g-4" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="col-sm-12">
                    <div class="mx-auto" style="max-width: 200px;">
                        {% if stu.pic %}
                            <img src="{{stu.pic.url}}" alt="" class="w-100">
                        {% endif %}
                        <input type="file" name="pic" class="form-control">
                    </div>
                </div>
                <div class="col-sm-6">
                    <label for="">Name</label>
                    <input type="text" name="name" value="{{stu.name}}" class="form-control text-dark" readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Father's Name</label>
                    <input type="text" name="fname" value="{{stu.fname}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Class</label>
                    <input type="text" name="sclass" value="{{stu.sclass}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Email</label>
                    <input type="text" name="fname" value="{{stu.email}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Mobile</label>
                    <input type="text" name="mobile" value="{{stu.mobile}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Father's Number</label>
                    <input type="text" name="fnumber" value="{{stu.fnumber}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Fee Paid</label>
                    <input type="text" name="sfee" value="{{stu.sfee}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-6">
                    <label for="">Rest Fee</label>
                    <input type="text" name="fnumber" value="{{stu.balance}}" class="form-control text-dark"  readonly="true">
                </div>
                <div class="col-sm-12 text-center">
                    <button type="submit" class="btn btn-success">Update</button>
                </div>
            </form>
        </div>
    </div>
{% endblock body %}
